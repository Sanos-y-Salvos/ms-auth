services:
  ms-auth:
    build: .
    image: felruiz/ms-auth:latest
    container_name: ms-auth
    env_file:
      - .env
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      DB_HOST: postgres
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sanos-network

  postgres:
    image: postgres:16-alpine
    container_name: ms-auth-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ms_auth}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ms_auth}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sanos-network

volumes:
  postgres_data:

networks:
  sanos-network:
    driver: bridge
